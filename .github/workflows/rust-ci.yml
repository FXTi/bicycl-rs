name: rust-ci

on:
  push:
    paths:
      - 'bicycl-rs/**'
      - 'bicycl-rs-sys/**'
      - 'scripts/**'
      - 'README.md'
      - 'LICENSE'
      - '.github/workflows/rust-ci.yml'
  pull_request:
    paths:
      - 'bicycl-rs/**'
      - 'bicycl-rs-sys/**'
      - 'scripts/**'
      - 'README.md'
      - 'LICENSE'
      - '.github/workflows/rust-ci.yml'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: [stable]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: C API smoke
        run: |
          cmake -S bicycl-rs-sys/capi -B build/capi -DBUILD_TESTING=ON
          cmake --build build/capi
          ctest --test-dir build/capi --output-on-failure
      - name: Rust fmt
        run: cargo fmt --check
        working-directory: .
      - name: Rust clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: .
      - name: Rust test
        run: cargo test
        working-directory: .
      - name: Rust test (system mode from local libs)
        run: bash scripts/test-system-mode.sh
        working-directory: .

  sanitize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: C API smoke with ASan/UBSan/LSan
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          cmake -S bicycl-rs-sys/capi -B build/capi-sanitize -DBUILD_TESTING=ON \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          cmake --build build/capi-sanitize
          ctest --test-dir build/capi-sanitize --output-on-failure

  package-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: package list (sys)
        working-directory: .
        run: cargo package --allow-dirty -p bicycl-rs-sys --list
      - name: package list (safe)
        working-directory: .
        run: cargo package --allow-dirty -p bicycl-rs --list
